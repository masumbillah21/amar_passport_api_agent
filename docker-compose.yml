version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://pypi.org/simple}"
    env_file:
      - .env
    command: uvicorn apps.api:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: "${PIP_INDEX_URL:-https://pypi.org/simple}"
    env_file:
      - .env
    command: streamlit run apps/streamlit_app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      API_BASE_URL: "http://api:8000"
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      - api
    ports:
      - "8501:8501"
